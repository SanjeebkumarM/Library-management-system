<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Students - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-dark shadow-sm border-bottom border-body sticky-top" data-bs-theme="dark">
      <div class="container px-3">
        <a class="navbar-brand fw-bold" href="admin_dashboard.html"><i class="bi bi-book"></i> Library Management System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link px-3" href="admin_dashboard.html">Scan & Issue</a></li>
            <li class="nav-item"><a class="nav-link px-3 active text-primary" href="manage_students.html">Manage Students</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="manage_books.html">Manage Books</a></li>
          </ul>
          
          <ul class="navbar-nav">
            <li class="nav-item dropdown mt-lg-0 pt-2 pt-lg-0 border-secondary border-lg-0">
              <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center justify-content-center gap-2 rounded-pill px-3 py-1 w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i> Admin: <span id="adminIdDisplay">Loading...</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 text-center text-lg-start">
                <li><button class="dropdown-item text-danger fw-bold" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
              </ul>
            </li>
          </ul>

        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row align-items-center mb-4 g-3">
        
        <div class="col-md-3">
          <h3 class="fw-bold mb-0">Student Directory</h3>
        </div>
        
        <div class="col-md-5">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" id="tableSearch" class="form-control border-start-0" placeholder="Search Roll No, Name, Branch...">
            <select id="statusFilter" class="form-select bg-light text-secondary fw-semibold border-start" style="max-width: 140px;">
              <option value="all">All Status</option>
              <option value="Overdue">Overdue</option>
              <option value="Active">Active</option>
              <option value="Clear">Clear</option>
            </select>
          </div>
        </div>

        <div class="col-md-4 text-md-end">
          <button type="button" class="btn btn-outline-danger shadow-sm me-2" id="runOverdueBtn">
             Run Overdue Check
          </button>
          <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addStudentModal">
             + Register Student
          </button>
        </div>
      </div>
      
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th class="ps-4">Roll No</th>
                  <th>Name & Contact</th>
                  <th>Branch</th>
                  <th>Batch</th>
                  <th>Digital Card</th>
                  <th>Current Status</th>
                  <th class="text-end pe-4">Actions</th>
                </tr>
              </thead>
              <tbody id="studentTableBody">
                 <tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border text-primary" role="status"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addStudentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title fw-bold">Register New Student</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="addStudentForm">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Roll No</label>
                  <input type="text" class="form-control" id="regRollNo" required>
                </div>
                <div class="col-md-8">
                  <label class="form-label small fw-bold">Full Name</label>
                  <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Email Address</label>
                  <input type="email" class="form-control" id="regEmail" placeholder="student@library.com" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Mobile Number</label>
                  <input type="text" class="form-control" id="regMobile" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Branch</label>
                  <select class="form-select" id="regBranch" required>
                    <option value="CSE">Computer Science & Engg</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="ETC">Electronics & Telecomm</option>
                    <option value="MET">Metallurgical Engineering</option>
                    <option value="EE">Electrical Engineering</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Admission Year</label>
                  <input type="number" class="form-control" id="regYear" value="2024" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Temporary Password</label>
                  <input type="text" class="form-control" id="regPassword" value="library123" required>
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold">Digital Library Card No</label>
                  <input type="text" class="form-control bg-light" id="regCardNo" placeholder="e.g. DIGI-CS-2024-001" required>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-success fw-bold" id="saveStudentBtn">Save Student</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editStudentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-warning text-dark">
            <h5 class="modal-title fw-bold">Edit Student Profile</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="editStudentForm">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Roll No (Read-Only)</label>
                  <input type="text" class="form-control bg-light" id="editRollNo" readonly>
                </div>
                <div class="col-md-8">
                  <label class="form-label small fw-bold">Full Name</label>
                  <input type="text" class="form-control" id="editName" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Email Address</label>
                  <input type="email" class="form-control" id="editEmail" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Mobile Number</label>
                  <input type="text" class="form-control" id="editMobile" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Branch</label>
                  <select class="form-select" id="editBranch" required>
                    <option value="CSE">Computer Science & Engg</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="ETC">Electronics & Telecomm</option>
                    <option value="MET">Metallurgical Engineering</option>
                    <option value="EE">Electrical Engineering</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Admission Year</label>
                  <input type="number" class="form-control" id="editYear" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Account Status</label>
                  <select class="form-select text-dark fw-bold" id="editStatus" required>
                    <option value="Active">Active</option>
                    <option value="Blocked">Blocked</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold">Digital Library Card No</label>
                  <input type="text" class="form-control" id="editCardNo" required>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-warning fw-bold" id="updateStudentBtn">Update Profile</button>
          </div>
        </div>
      </div>
    </div>

    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="historyOffcanvas" style="width: 450px;">
      <div class="offcanvas-header bg-dark text-white">
        <h5 class="offcanvas-title fw-bold">Borrowing History</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body bg-light">
        <div class="text-center mb-4">
          <img src="" id="drawerAvatar" class="rounded-circle shadow-sm mb-2" alt="Avatar" style="width: 80px; height: 80px;">
          <h4 id="drawerStudentName" class="fw-bold mb-0">Loading...</h4>
          <p id="drawerRollNo" class="text-muted small">Loading...</p>
        </div>
        <div class="card border-0 shadow-sm">
          <div class="card-body p-0">
            <table class="table table-hover table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-3 py-2">Book Details</th>
                  <th>Timeline</th> 
                  <th class="pe-3 text-end">Status</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                 </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/manage_students.js"></script>
  </body>
</html>
