<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Books - Borrowing History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/student_my_books.css">
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm border-bottom sticky-top">
      <div class="container px-3">
        <a class="navbar-brand fw-bold text-primary ms-0" href="student_dashboard.html"><i class="bi bi-book"></i> My Library</a>
        <div class="d-flex align-items-center order-lg-last">
          <button class="navbar-toggler border-0 px-0" type="button" data-bs-toggle="collapse" data-bs-target="#studentNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div class="collapse navbar-collapse" id="studentNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link px-3 fw-semibold" href="student_dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link px-3 fw-semibold" href="student_catalog.html">Book Catalog</a></li>
            <li class="nav-item"><a class="nav-link px-3 active text-primary fw-semibold" href="student_my_books.html">My Books</a></li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item dropdown mt-lg-0 pt-2 pt-lg-0 border-secondary border-lg-0">
              <button class="btn btn-outline-dark dropdown-toggle d-flex align-items-center justify-content-center gap-2 rounded-pill px-3 py-1 w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>Student ID: <span id="IdDisplay">Loading...</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end border-0 mt-2 text-center text-lg-start">
                <li><button class="dropdown-item text-danger fw-bold" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row mb-3 align-items-center g-2">
      <div class="col-md-6">
        <h3 class="fs-5 fw-bold mb-3 ">My Activity</h3>
       </div>   
       <ul class="nav nav-tabs" id="bookTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <a class="nav-link active" aria-current="page" data-bs-toggle="tab" data-bs-target="#activeLoans" type="button" >Borrowed</a>
          </li>
          <li class="nav-item" role="presentation">
            <a class="nav-link" data-bs-toggle="tab" data-bs-target="#pendingRequests" type="button" >Pending Requests</a>
          </li>
          <li class="nav-item" role="presentation">
            <a class="nav-link" data-bs-toggle="tab" data-bs-target="#pastHistory" type="button" >History</a>
          </li>
        </ul>

       <div class="tab-content" id="bookTabsContent">
         <div class="tab-pane fade show active" id="activeLoans">
          <div class="row g-3" id="activeLoansContainer">
            <div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
          </div>
         </div>

         <div class="tab-pane fade" id="pendingRequests">
          <div class="row g-3" id="pendingRequestsContainer">
             <div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
          </div>
         </div>

         <div class="tab-pane fade" id="pastHistory">
          <div class="row g-3" id="pastHistoryContainer">
             <div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
          </div>
         </div>
        </div>
       </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/student_my_books.js"></script>
  </body>
</html>
