<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
      body { background-color: #f4f7f6; }
      .login-card { max-width: 400px; margin: auto; margin-top: 10vh; border-radius: 15px; }
      .icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px auto;
        font-size: 2rem;
      }
      .bg-admin {
        background-color: rgba(25, 135, 84, 0.1);
        color: #198754;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="card shadow-sm border-0 login-card">
        <div class="card-body p-5 text-center">
          
          <div class="mb-4">
            <div class="icon-circle bg-admin">
                <i class="bi bi-shield-lock-fill"></i>
              </div>
            <h3 class="fw-bold mt-2">Admin Portal</h3>
          </div>

          <div id="errorMessage" class="alert alert-danger small py-2 d-none"></div>

          <form id="adminLoginForm">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="employee_id" placeholder="LIB-001" required>
              <label for="employee_id">Employee ID</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="password" placeholder="Password" required>
              <label for="password">Password</label>
            </div>
            <button class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-sm" type="submit" id="loginBtn">Login</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="js/admin_auth.js"></script>
  </body>
</html>
