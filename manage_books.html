<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Books - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-dark shadow-sm border-bottom border-body sticky-top" data-bs-theme="dark">
      <div class="container px-3">
        <a class="navbar-brand fw-bold" href="admin_dashboard.html"><i class="bi bi-book"></i> Library Management System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link px-3" href="admin_dashboard.html">Scan & Issue</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="manage_students.html">Manage Students</a></li>
            <li class="nav-item"><a class="nav-link px-3 active text-primary" href="manage_books.html">Manage Books</a></li>
          </ul>
          
          <ul class="navbar-nav">
            <li class="nav-item dropdown mt-lg-0 pt-2 pt-lg-0 border-secondary border-lg-0">
              <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center justify-content-center gap-2 rounded-pill px-3 py-1 w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i> Admin: <span id="adminIdDisplay">Loading...</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 text-center text-lg-start">
                <li><button class="dropdown-item text-danger fw-bold" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
              </ul>
            </li>
          </ul>

        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row align-items-center mb-4 g-3">
        <div class="col-md-3">
          <h3 class="fw-bold mb-0">Book Catalog</h3>
        </div>
       <div class="col-md-5">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" id="bookSearch" class="form-control border-start-0" placeholder="Search title, Author, Book No...">
            <select id="statusFilter" class="form-select bg-light text-secondary fw-semibold border-start" style="max-width: 140px;">
              <option value="all">All Books</option>
              <option value="GEN">General</option>
              <option value="CSE">Computer Science</option>
              <option value="CIVIL">Civil</option>
              <option value="MECH">Mechanical</option>
              <option value="EE">Electrical</option>
              <option value="MET">Metallurgical</option>
              <option value="ETC">Electronics</option>
            </select>
          </div>
        </div>
        <div class="col-md-4 text-md-end">
          <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addBookModal">
            + Add New Book
          </button>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th class="ps-4">Book No</th>
                  <th>Title & Author</th>
                  <th>Branch</th>
                  <th class="text-center">Total</th>
                  <th class="text-center">Available</th>
                  <th class="text-center">Stock</th>
                  <th class="text-end pe-4">Actions</th>
                </tr>
              </thead>
              <tbody id="bookTableBody">
                 <tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border text-primary"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addBookModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title fw-bold">Add New Book</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="addBookForm">
              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label small fw-bold">Book Title</label>
                  <input type="text" class="form-control" id="bookTitle" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Book No (ID)</label>
                  <input type="text" class="form-control" id="bookNo" placeholder="e.g. CSE-105" required>
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold">Author Name</label>
                  <input type="text" class="form-control" id="bookAuthor" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Branch / Category</label>
                  <select class="form-select" id="bookBranch" required>
                    <option value="GEN">General</option>
                    <option value="CSE">Computer Science & Engg</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="ETC">Electronics & Telecomm.</option>
                    <option value="MET">Metallurgical Engineering</option>
                    <option value="EE">Electrical Engineering</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Total Copies</label>
                  <input type="number" class="form-control" id="bookTotal" min="1" value="1" required>
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold">Cover Image</label>
                  <input type="file" class="form-control" id="bookCover" accept="image/*">
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-success fw-bold" id="saveBookBtn">Save Book</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editBookModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-warning text-dark">
            <h5 class="modal-title fw-bold">Edit Book Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="editBookForm">
              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label small fw-bold">Book Title</label>
                  <input type="text" class="form-control" id="editTitle" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Book No (Read-Only)</label>
                  <input type="text" class="form-control bg-light" id="editBookNo" readonly>
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold">Author Name</label>
                  <input type="text" class="form-control" id="editAuthor" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Branch / Category</label>
                  <select class="form-select" id="editBranch" required>
                    <option value="GEN">General</option>
                    <option value="CSE">Computer Science & Engg</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="ETC">Electronics & Telecomm.</option>
                    <option value="MET">Metallurgical Engineering</option>
                    <option value="EE">Electrical Engineering</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Total Copies</label>
                  <input type="number" class="form-control" id="editTotal" min="1" required>
                  <input type="hidden" id="editOriginalTotal">
                  <input type="hidden" id="editAvailable">
                </div>
                <div class="col-12">
                   <label class="form-label small fw-bold">Book Cover Image</label>
                   <input type="file" class="form-control" id="editBookCover" accept="image/*">
                  <div class="form-text">Leave blank to keep the current cover.</div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-warning fw-bold" id="updateBookBtn">Update Book</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/manage_books.js"></script>
  </body>
</html>
