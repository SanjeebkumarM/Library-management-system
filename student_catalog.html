<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/student_catalog.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm border-bottom sticky-top">
      <div class="container px-3">
        <a class="navbar-brand fw-bold text-primary ms-0" href="student_dashboard.html"><i class="bi bi-book"></i> My Library</a>
        <div class="d-flex align-items-center order-lg-last">
          
          <button class="btn border-0 bg-transparent p-0 position-relative d-flex align-items-center me-3 me-lg-0" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
            <span class="d-none d-sm-inline-block fw-bold text-dark me-2" style="font-size: 1rem;"></span>
            <i class="bi bi-cart-check text-primary" style="font-size: 1.5rem;"></i>
            <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow-sm" style="font-size: 0.60rem;">0</span>
          </button>

          <button class="navbar-toggler border-0 px-0" type="button" data-bs-toggle="collapse" data-bs-target="#studentNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>

        </div>

        <div class="collapse navbar-collapse " id="studentNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link px-3 fw-semibold" href="student_dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link px-3 active text-primary fw-semibold" href="student_catalog.html">Book Catalog</a></li>
            <li class="nav-item"><a class="nav-link px-3 fw-semibold" href="student_my_books.html">My Books</a></li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item dropdown container-fluid mt-lg-0 pt-2 pt-lg-0 border-secondary border-lg-0">
              <button class="btn btn-outline-dark dropdown-toggle d-flex align-items-center justify-content-center gap-2 rounded-pill px-3 py-1 w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>Student ID: <span id="IdDisplay">Loading...</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end border-0 mt-2 text-center text-lg-start">
                <li><button class="dropdown-item text-danger fw-bold" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row mb-2 align-items-center g-3">
        <div class="mt-2 mb-0">
          <h3 class="fs-5 fw-bold mt-2 md-2">Book Catalog</h3>
        </div>
        <div class="py-1 md-3">
          <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-2 "><i class="bi bi-search"></i></span>
            <input type="text" id="catalogSearch" class="form-control border-start-0 py-2" placeholder="Search title or ID...">
          </div>
        </div>
      </div>

      <div class="d-none d-md-flex flex-wrap gap-2 mb-4" id="categoryFiltersDesktop">
        <button class="btn btn-dark rounded-pill px-3 filter-btn" data-filter="all">All Books</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="GEN">GEN</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="CSE">CSE</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="MECH">MECH</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="CIVIL">CIVIL</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="ETC">ETC</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="MET">MET</button>
        <button class="btn btn-outline-dark rounded-pill px-3 filter-btn" data-filter="EE">EE</button>
      </div>

      <div class="d-md-none mb-4">
        <select class="form-select form-select-lg fs-6 shadow-sm fw-bold border-0 text-dark" id="categoryFilterMobile">
          <option value="all">All Books</option>
          <option value="GEN">General</option>
          <option value="CSE">Computer Science & Engineering</option>
          <option value="MECH">Mechanical Engineering</option>
          <option value="CIVIL">Civil Engineering</option>
          <option value="ETC">Electronics & Telecommunication Engg</option>
          <option value="MET">Metallurgical Engineering</option>
          <option value="EE">Electrical Engineering</option>
        </select>
      </div>
      
      <div class="mini-book-grid" id="bookGrid">
         <div class="col-12 text-center mx-auto py-5 text-muted" id="loadingMessage">
             <div class="spinner-border text-primary mb-3" role="status"></div>
             <p>Loading...</p>
         </div>
      </div>

    </div>

    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="cartOffcanvas" style="width: 400px;">
      <div class="offcanvas-header bg-primary text-white">
        <h5 class="offcanvas-title fw-bold">My Borrowing Cart</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column bg-light p-3">
        <div id="cartItemsList" class="flex-grow-1 overflow-auto">
          <div class="text-center text-muted mt-5 py-5">
            <h1 class="display-4 opacity-50 mb-3"><i class="bi bi-cart-check"></i></h1>
            <p>Your cart is empty.</p>
            <p class="small">Click 'Borrow' on a book to add it here.</p>
          </div>
        </div>
        
        <div class="mt-auto pt-3 border-top bg-light">
          <p class="small text-muted mb-2 text-center">Books in cart must be approved by the librarian.</p>
          <div class="row g-2">
            <div class="col-4">
              <button class="btn btn-outline-danger w-100 fw-bold" onclick="discardCart()">Discard</button>
            </div>
            <div class="col-8">
              <button class="btn btn-success w-100 fw-bold shadow-sm" id="submitCartBtn" onclick="submitCart()">Submit Request</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/student_catalog.js"></script>
  </body>
</html>
